<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D CT Viewer</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }
        .header {
            height: 50px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .main-container {
            height: calc(100vh - 50px);
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 4px;
            padding: 4px;
        }
        .view-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .view-header {
            height: 32px;
            background: var(--bg-tertiary);
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 500;
        }
        .view-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #000;
        }
        .drop-zone {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--border-color);
            margin: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .drop-zone:hover, .drop-zone.active {
            border-color: var(--accent);
            background: rgba(88, 166, 255, 0.1);
        }
        .drop-zone-icon { font-size: 48px; margin-bottom: 16px; }
        .drop-zone-text { font-size: 16px; color: var(--text-secondary); }
        .drop-zone-hint { font-size: 13px; color: var(--text-secondary); margin-top: 8px; }
        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
        }
        .btn:hover { border-color: var(--accent); }
        .preset-btn { padding: 4px 10px; font-size: 12px; background: transparent; }
        .toolbar { display: flex; gap: 8px; align-items: center; }
        .toolbar-group { display: flex; gap: 4px; padding: 0 8px; border-right: 1px solid var(--border-color); }
        .input-label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
        .input-label input {
            width: 60px;
            padding: 4px 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 12px;
        }
        canvas { max-width: 100%; max-height: 100%; }
        .patient-info {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            z-index: 10;
        }
        .anatomical-marker {
            position: absolute;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: bold;
        }
        .marker-A { top: 4px; right: 8px; }
        .marker-P { bottom: 4px; right: 8px; }
        .marker-L { left: 8px; top: 50%; transform: translateY(-50%); }
        .marker-R { right: 8px; top: 50%; transform: translateY(-50%); }
    </style>
</head>
<body>
    <header class="header">
        <h1>3D CT Viewer</h1>
        <div class="toolbar">
            <div class="toolbar-group">
                <button class="btn preset-btn" onclick="applyPreset('lung')">Lung</button>
                <button class="btn preset-btn" onclick="applyPreset('bone')">Bone</button>
                <button class="btn preset-btn" onclick="applyPreset('brain')">Brain</button>
                <button class="btn preset-btn" onclick="applyPreset('abdomen')">Abdomen</button>
            </div>
            <div class="toolbar-group">
                <label class="input-label">
                    WW: <input type="number" id="windowWidth" value="400" onchange="updateWindow()">
                </label>
                <label class="input-label">
                    WC: <input type="number" id="windowCenter" value="40" onchange="updateWindow()">
                </label>
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="view-panel">
            <div class="view-header">
                <span>Axial</span>
                <span id="axial-slice-info">Slice: 0/0</span>
            </div>
            <div class="view-content" id="axial-container">
                <div class="drop-zone" id="drop-zone">
                    <div class="drop-zone-icon">[+]</div>
                    <div class="drop-zone-text">Click or drag DICOM/raw CT folder</div>
                    <div class="drop-zone-hint">Supports .dcm files and raw 16-bit data</div>
                    <input type="file" id="file-input" webkitdirectory multiple style="display:none">
                </div>
                <canvas id="axial-canvas" style="display:none"></canvas>
                <span class="anatomical-marker marker-A">A</span>
                <span class="anatomical-marker marker-P">P</span>
                <span class="anatomical-marker marker-L">L</span>
                <span class="anatomical-marker marker-R">R</span>
            </div>
        </div>

        <div class="view-panel">
            <div class="view-header">
                <span>Coronal</span>
                <span id="coronal-slice-info">Slice: 0/0</span>
            </div>
            <div class="view-content">
                <canvas id="coronal-canvas" style="display:none"></canvas>
                <span class="anatomical-marker marker-A">A</span>
                <span class="anatomical-marker marker-P">P</span>
                <span class="anatomical-marker marker-L">L</span>
                <span class="anatomical-marker marker-R">R</span>
            </div>
        </div>

        <div class="view-panel">
            <div class="view-header">
                <span>Sagittal</span>
                <span id="sagittal-slice-info">Slice: 0/0</span>
            </div>
            <div class="view-content">
                <canvas id="sagittal-canvas" style="display:none"></canvas>
                <span class="anatomical-marker marker-A">A</span>
                <span class="anatomical-marker marker-P">P</span>
                <span class="anatomical-marker marker-L">L</span>
                <span class="anatomical-marker marker-R">R</span>
            </div>
        </div>

        <div class="view-panel">
            <div class="view-header">
                <span>3D View</span>
            </div>
            <div class="view-content">
                <canvas id="volume-canvas" style="display:none"></canvas>
                <div id="volume-hint" style="color: var(--text-secondary); text-align: center;">
                    <p>3D Volume Rendering</p>
                    <p>Shows middle slice preview</p>
                </div>
            </div>
        </div>
    </main>

    <div class="patient-info" id="patient-info" style="display:none">
        <div>Patient: <span id="patient-name">Unknown</span></div>
        <div>Size: <span id="dimensions">-</span></div>
        <div>Format: <span id="data-format">-</span></div>
    </div>

    <script src="https://unpkg.com/dicom-parser@1.8.21/dist/dicomParser.min.js"></script>
    <script>
        var dicomData = null;
        var currentSlice = { axial: 0, coronal: 0, sagittal: 0 };
        var windowSettings = { center: 40, width: 400 };

        var dropZone = document.getElementById('drop-zone');
        var fileInput = document.getElementById('file-input');

        dropZone.addEventListener('click', function() { fileInput.click(); });
        dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('active'); });
        dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('active'); });
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            dropZone.classList.remove('active');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', function(e) { handleFiles(e.target.files); });

        async function handleFiles(files) {
            var fileList = Array.from(files);
            
            // Try to detect file type
            var dcmFiles = fileList.filter(function(f) { 
                return f.name.toLowerCase().endsWith('.dcm') || f.name.toLowerCase().endsWith('.dicom');
            });
            
            // If no .dcm files, try all files as raw data
            if (dcmFiles.length === 0) {
                dcmFiles = fileList;
            }

            if (dcmFiles.length === 0) {
                alert('No files found');
                return;
            }

            try {
                // First try as DICOM
                var firstFile = dcmFiles[0];
                var arrayBuffer = await firstFile.arrayBuffer();
                var bytes = new Uint8Array(arrayBuffer);
                
                // Check for DICM header at position 128
                var isDicom = bytes.length > 131 && 
                              bytes[128] === 68 && bytes[129] === 73 && 
                              bytes[130] === 67 && bytes[131] === 77;
                
                if (isDicom) {
                    await loadDicomFiles(dcmFiles);
                } else {
                    await loadRawFiles(dcmFiles);
                }
            } catch (err) {
                alert('Load failed: ' + err.message);
            }
        }

        async function loadDicomFiles(files) {
            var slices = [];

            for (var i = 0; i < files.length; i++) {
                try {
                    var file = files[i];
                    var arrayBuffer = await file.arrayBuffer();
                    var byteArray = new Uint8Array(arrayBuffer);
                    var dataSet = dicomParser.parseDicom(byteArray);

                    var pixelDataElement = dataSet.elements.x7fe00010;
                    if (!pixelDataElement) continue;

                    var width = dataSet.uint16('x00280011', 0) || 512;
                    var height = dataSet.uint16('x00280010', 0) || 512;
                    var bitsAllocated = dataSet.uint16('x00280100', 0) || 16;
                    
                    var pixelData;
                    if (bitsAllocated === 16) {
                        pixelData = new Int16Array(arrayBuffer, pixelDataElement.dataOffset, pixelDataElement.length / 2);
                    } else {
                        pixelData = new Uint8Array(arrayBuffer, pixelDataElement.dataOffset, pixelDataElement.length);
                    }

                    slices.push({
                        pixelData: pixelData,
                        width: width,
                        height: height,
                        instanceNumber: parseFloat(dataSet.string('x00200013')) || slices.length,
                        sliceLocation: parseFloat(dataSet.string('x00201032')) || slices.length
                    });
                } catch (e) {
                    console.warn('Skip file:', file.name, e);
                }
            }

            if (slices.length === 0) throw new Error('No valid DICOM data');

            slices.sort(function(a, b) { return a.sliceLocation - b.sliceLocation; });

            var first = slices[0];
            var allPixels = new Int16Array(slices.length * first.width * first.height);
            slices.forEach(function(s, i) {
                allPixels.set(s.pixelData, i * first.width * first.height);
            });

            dicomData = {
                pixelData: allPixels,
                width: first.width,
                height: first.height,
                numSlices: slices.length
            };

            currentSlice.axial = Math.floor(slices.length / 2);
            currentSlice.coronal = Math.floor(first.height / 2);
            currentSlice.sagittal = Math.floor(first.width / 2);

            showViewer('DICOM');
        }

        async function loadRawFiles(files) {
            // Sort files by name (numeric sort)
            files.sort(function(a, b) {
                var numA = parseInt(a.name.match(/\d+/) || [0]);
                var numB = parseInt(b.name.match(/\d+/) || [0]);
                return numA - numB;
            });

            // Load first file to determine dimensions
            var firstFile = files[0];
            var firstBuffer = await firstFile.arrayBuffer();
            var fileSize = firstBuffer.byteLength;
            
            // Detect dimensions: assume 16-bit grayscale
            // 131072 bytes = 256x256x2 (most common)
            var width, height;
            if (fileSize === 131072) {
                width = 256;
                height = 256;
            } else if (fileSize === 262144) {
                width = 512;
                height = 256;
            } else if (fileSize === 524288) {
                width = 512;
                height = 512;
            } else {
                // Try to guess square dimensions
                var pixels = fileSize / 2;
                var sqrt = Math.sqrt(pixels);
                width = Math.round(sqrt);
                height = Math.round(sqrt);
            }

            var slices = [];
            for (var i = 0; i < files.length; i++) {
                var buffer = await files[i].arrayBuffer();
                var pixelData = new Int16Array(buffer);
                slices.push(pixelData);
            }

            var allPixels = new Int16Array(slices.length * width * height);
            slices.forEach(function(s, i) {
                allPixels.set(s, i * width * height);
            });

            dicomData = {
                pixelData: allPixels,
                width: width,
                height: height,
                numSlices: slices.length
            };

            currentSlice.axial = Math.floor(slices.length / 2);
            currentSlice.coronal = Math.floor(height / 2);
            currentSlice.sagittal = Math.floor(width / 2);

            showViewer('Raw 16-bit');
        }

        function showViewer(format) {
            document.getElementById('drop-zone').style.display = 'none';
            document.getElementById('axial-canvas').style.display = 'block';
            document.getElementById('coronal-canvas').style.display = 'block';
            document.getElementById('sagittal-canvas').style.display = 'block';
            document.getElementById('volume-canvas').style.display = 'block';
            document.getElementById('volume-hint').style.display = 'none';
            document.getElementById('patient-info').style.display = 'block';
            document.getElementById('dimensions').textContent = 
                dicomData.width + ' x ' + dicomData.height + ' x ' + dicomData.numSlices;
            document.getElementById('data-format').textContent = format;

            renderAllViews();
        }

        function applyWindowing(pixelData, windowCenter, windowWidth) {
            var result = new Uint8Array(pixelData.length);
            var min = windowCenter - windowWidth / 2;
            var max = windowCenter + windowWidth / 2;

            for (var i = 0; i < pixelData.length; i++) {
                var value = pixelData[i];
                if (value <= min) result[i] = 0;
                else if (value >= max) result[i] = 255;
                else result[i] = Math.round(((value - min) / windowWidth) * 255);
            }
            return result;
        }

        function renderSlice(canvas, pixelData, width, height, sliceIndex, viewType) {
            var ctx = canvas.getContext('2d');
            var sliceData;
            var sliceSize = width * height;
            var canvasWidth, canvasHeight;

            if (viewType === 'axial') {
                canvasWidth = width;
                canvasHeight = height;
                sliceData = new Int16Array(sliceSize);
                for (var i = 0; i < sliceSize; i++) {
                    sliceData[i] = pixelData[sliceIndex * sliceSize + i];
                }
            } else if (viewType === 'coronal') {
                canvasWidth = width;
                canvasHeight = dicomData.numSlices;
                sliceData = new Int16Array(canvasWidth * canvasHeight);
                var y = sliceIndex;
                for (var z = 0; z < dicomData.numSlices; z++) {
                    for (var x = 0; x < width; x++) {
                        sliceData[z * width + x] = pixelData[z * sliceSize + y * width + x];
                    }
                }
            } else if (viewType === 'sagittal') {
                canvasWidth = height;
                canvasHeight = dicomData.numSlices;
                sliceData = new Int16Array(canvasWidth * canvasHeight);
                var x = sliceIndex;
                for (var z = 0; z < dicomData.numSlices; z++) {
                    for (var y = 0; y < height; y++) {
                        sliceData[z * height + y] = pixelData[z * sliceSize + y * width + x];
                    }
                }
            }

            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            
            var grayscale = applyWindowing(sliceData, windowSettings.center, windowSettings.width);
            var imageData = ctx.createImageData(canvasWidth, canvasHeight);
            for (var i = 0; i < grayscale.length; i++) {
                imageData.data[i * 4] = grayscale[i];
                imageData.data[i * 4 + 1] = grayscale[i];
                imageData.data[i * 4 + 2] = grayscale[i];
                imageData.data[i * 4 + 3] = 255;
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function renderAllViews() {
            if (!dicomData) return;

            renderSlice(
                document.getElementById('axial-canvas'),
                dicomData.pixelData, dicomData.width, dicomData.height,
                currentSlice.axial, 'axial'
            );
            renderSlice(
                document.getElementById('coronal-canvas'),
                dicomData.pixelData, dicomData.width, dicomData.height,
                currentSlice.coronal, 'coronal'
            );
            renderSlice(
                document.getElementById('sagittal-canvas'),
                dicomData.pixelData, dicomData.width, dicomData.height,
                currentSlice.sagittal, 'sagittal'
            );

            document.getElementById('axial-slice-info').textContent = 
                'Slice: ' + (currentSlice.axial + 1) + '/' + dicomData.numSlices;
            document.getElementById('coronal-slice-info').textContent = 
                'Slice: ' + (currentSlice.coronal + 1) + '/' + dicomData.height;
            document.getElementById('sagittal-slice-info').textContent = 
                'Slice: ' + (currentSlice.sagittal + 1) + '/' + dicomData.width;
        }

        function applyPreset(preset) {
            var presets = {
                lung: { center: -600, width: 1500 },
                bone: { center: 300, width: 1500 },
                brain: { center: 40, width: 80 },
                abdomen: { center: 60, width: 400 }
            };
            var p = presets[preset];
            windowSettings.center = p.center;
            windowSettings.width = p.width;
            document.getElementById('windowCenter').value = p.center;
            document.getElementById('windowWidth').value = p.width;
            renderAllViews();
        }

        function updateWindow() {
            windowSettings.center = parseInt(document.getElementById('windowCenter').value) || 40;
            windowSettings.width = parseInt(document.getElementById('windowWidth').value) || 400;
            renderAllViews();
        }

        document.querySelectorAll('.view-content').forEach(function(container, index) {
            var views = ['axial', 'coronal', 'sagittal'];
            if (index >= 3) return;

            container.addEventListener('wheel', function(e) {
                if (!dicomData) return;
                e.preventDefault();
                var delta = e.deltaY > 0 ? -1 : 1;
                var max = index === 0 ? dicomData.numSlices : 
                           index === 1 ? dicomData.height : dicomData.width;
                currentSlice[views[index]] = Math.max(0, 
                    Math.min(currentSlice[views[index]] + delta, max - 1));
                renderAllViews();
            });
        });
    </script>
</body>
</html>
